# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Duser.timezone=UTC -Duser.language=en -Duser.country=US
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Workaround for VerifyException on future system dates (2026+)
android.experimental.reproducible.builds=true
# Use older APK creator which may be less strict about dates
#android.useNewApkCreator=false
